apiVersion: apps/v1
kind: Deployment
metadata:
  name: nb-data
  namespace: fybrik-notebook-sample
  labels:
    app: nb-data
    team: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nb-data
      team: data
  template:
    metadata:
      labels:
        app: nb-data
        team: data
    spec:
      containers:
        - name: notebook
          image: jupyter/minimal-notebook:python-3.11
          ports:
            - containerPort: 8888
          env:
            - name: JUPYTER_TOKEN
              value: "tcc-token"
---
